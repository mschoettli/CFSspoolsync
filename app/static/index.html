<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFSspoolsync</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header id="header">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <circle cx="14" cy="14" r="13" fill="#222736" stroke="#3a4155" stroke-width="1"/>
      <circle cx="14" cy="14" r="10" fill="none" stroke="#2dd4a0" stroke-width="1.5" opacity="0.25"/>
      <circle cx="14" cy="14" r="7.5" fill="none" stroke="#2dd4a0" stroke-width="1.5" opacity="0.55"/>
      <circle cx="14" cy="14" r="5" fill="none" stroke="#2dd4a0" stroke-width="1.5" opacity="0.85"/>
      <circle cx="14" cy="14" r="2.5" fill="#1a1f2e"/>
      <circle cx="14" cy="14" r="1.2" fill="#2dd4a0"/>
      <line x1="14" y1="1" x2="14" y2="7" stroke="#2dd4a0" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
      <line x1="14" y1="21" x2="14" y2="27" stroke="#2dd4a0" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
      <line x1="1" y1="14" x2="7" y2="14" stroke="#2dd4a0" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
      <line x1="21" y1="14" x2="27" y2="14" stroke="#2dd4a0" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
    </svg>
    <span class="logo-text"><span style="color:#f0f4ff">CFS</span><em>spoolsync</em></span>
  </div>

  <nav id="nav">
    <button class="nav-btn active" data-view="cfs">Spulen</button>
    <button class="nav-btn" data-view="lager">Lager</button>
    <button class="nav-btn" data-view="jobs">Druckjobs</button>
  </nav>

  <div class="printer-status" id="printerStatus">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-label" id="statusLabel">Verbinde…</span>
    <span class="status-sep">|</span>
    <span class="status-temp" id="statusTemps"></span>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<main id="main">

  <!-- CFS View -->
  <section id="view-cfs" class="view active">
    <div class="view-header">
      <h2>CFS Spulen</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" id="btnSyncK2" title="Gewichte aus K2 CFS-JSON übernehmen">⟳ Sync mit K2</button>

      </div>
    </div>
    <div class="stats-grid" id="dashboardStats"></div>
    <div class="slots-grid" id="slotsGrid"></div>
  </section>

  <!-- Lager View -->
  <section id="view-lager" class="view">
    <div class="view-header">
      <h2>Lager</h2>
      <div class="view-actions">
        <select class="select-filter" id="filterStatus">
          <option value="">Alle Status</option>
          <option value="lager">Lager</option>
          <option value="aktiv">Aktiv (CFS)</option>
          <option value="leer">Leer</option>
        </select>
        <button class="btn btn-primary btn-sm" id="btnAddSpool">+ Neue Spule</button>
      </div>
    </div>
    <div id="spoolsList"></div>
  </section>

  <!-- Jobs View -->
  <section id="view-jobs" class="view">
    <div class="view-header">
      <h2>Druckjobs</h2>
    </div>
    <div id="jobsList"></div>
  </section>

</main>

<!-- ── Modal ─────────────────────────────────────────────────────────────── -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────────────────────────────── -->
<div id="toastContainer"></div>

<!-- ── Footer ─────────────────────────────────────────────────────────────── -->
<footer class="app-footer">
  CFSspoolsync v1.0 &nbsp;·&nbsp; &copy; 2026 mschoettli &nbsp;·&nbsp;
  <a href="https://www.gnu.org/licenses/gpl-3.0" target="_blank">GPL v3</a>
</footer>

<script type="module" src="/app.js"></script>
</body>
</html>
