services:
  cfsspoolsync:
    build: .
    container_name: cfsspoolsync
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ${K2_SSH_KEY:-/root/.ssh/id_k2}:${K2_SSH_KEY:-/root/.ssh/id_k2}:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/printer/status', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
