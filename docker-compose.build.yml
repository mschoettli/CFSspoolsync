version: "3.8"

# Lokale Entwicklung – baut das Image direkt aus dem Quellcode
# Verwendung: docker compose -f docker-compose.build.yml up -d --build

services:
  cfsspoolsync:
    build: .
    container_name: cfsspoolsync
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ${K2_SSH_KEY:-/root/.ssh/id_k2}:${K2_SSH_KEY:-/root/.ssh/id_k2}:ro
    env_file:
      - .env
    networks:
      - cfsspoolsync-net

networks:
  cfsspoolsync-net:
    driver: bridge
