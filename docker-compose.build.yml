# Override-File: Build Images lokal aus dem Source-Code statt sie aus
# der Registry zu ziehen.
#
# Verwendung:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# Praktisch für Entwicklung oder wenn du nicht gegen ghcr.io pushen willst.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cfs-filament-tracker-backend:local
    # Watchtower soll lokal gebaute Images NICHT updaten
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: cfs-filament-tracker-frontend:local
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
