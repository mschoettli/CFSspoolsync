# Override file: build images locally from source code instead of
# pulling them from the registry.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# Useful for development or when you do not want to push to ghcr.io.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cfsspoolsync-backend:local
    # Watchtower should NOT update locally built images
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: cfsspoolsync-frontend:local
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

