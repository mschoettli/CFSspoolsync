version: "3.8"

services:
  cfsspoolsync:
    build: .
    container_name: cfsspoolsync
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ${K2_SSH_KEY:-/root/.ssh/id_k2}:${K2_SSH_KEY:-/root/.ssh/id_k2}:ro
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/cfs.db}
      - K2_HOST=${K2_HOST:-192.168.0.0}
      - K2_SSH_USER=${K2_SSH_USER:-root}
      - K2_SSH_KEY=${K2_SSH_KEY:-/root/.ssh/id_k2}
      - MOONRAKER_URL=${MOONRAKER_URL:-http://192.168.0.0:7125}
      - CFS_JSON_PATH=${CFS_JSON_PATH:-/mnt/UDISK/creality/userdata/box/material_box_info.json}
    networks:
      - cfsspoolsync-net

networks:
  cfsspoolsync-net:
    driver: bridge
