services:
  db:
    image: postgres:16-alpine
    container_name: cfsv3-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cfsspoolsync}
      POSTGRES_USER: ${POSTGRES_USER:-cfs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cfs}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cfs} -d ${POSTGRES_DB:-cfsspoolsync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cfsv3-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: cfsv3-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  db_data:
