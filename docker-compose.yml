# CFSspoolsync - Production Stack
#
# Uses prebuilt images from GitHub Container Registry.
# On every push to main, GitHub Actions builds new images,
# and Watchtower pulls them automatically to the host.
#
# For local builds from source code instead:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d

services:
  backend:
    image: ${REGISTRY:-ghcr.io/mschoettli}/cfsspoolsync-backend:${TAG:-latest}
    container_name: cfsspoolsync
    restart: unless-stopped
    environment:
      # Leave empty for simulator mode. Set IP/hostname of your K2 for live mode.
      CFS_MOONRAKER_HOST: ${CFS_MOONRAKER_HOST:-}
      CFS_MOONRAKER_PORT: ${CFS_MOONRAKER_PORT:-7125}
      CFS_DATABASE_URL: sqlite:////app/data/cfs.db
      CFS_CORS_ORIGINS: "*"
    volumes:
      - cfs-data:/app/data
    networks:
      - cfs
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: ${REGISTRY:-ghcr.io/mschoettli}/cfsspoolsync-frontend:${TAG:-latest}
    container_name: cfs-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8088}:80"
    depends_on:
      - backend
    networks:
      - cfs
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Auto-update: checks the registry every 5 minutes and updates images automatically.
  # Only containers with label watchtower.enable=true are considered.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: cfs-watchtower
    restart: unless-stopped
    environment:
      # Guard against old injected Docker API values (for example 1.25).
      DOCKER_API_VERSION: "1.44"
      WATCHTOWER_POLL_INTERVAL: 300       # 5 min
      WATCHTOWER_CLEANUP: "true"          # remove old images
      WATCHTOWER_LABEL_ENABLE: "true"     # update only labeled containers
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      TZ: ${TZ:-Europe/Zurich}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cfs

volumes:
  cfs-data:
    name: cfs-data

networks:
  cfs:
    name: cfs
