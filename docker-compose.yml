# CFS Filament Tracker — Production Stack
#
# Nutzt fertig gebaute Images von GitHub Container Registry.
# Bei jedem git-push auf main baut GitHub Actions neue Images,
# und Watchtower zieht sie automatisch auf den Host.
#
# Für lokales Bauen aus dem Source-Code stattdessen:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d

services:
  backend:
    image: ${REGISTRY:-ghcr.io/marius}/cfs-filament-tracker-backend:${TAG:-latest}
    container_name: cfs-backend
    restart: unless-stopped
    environment:
      # Leer lassen für Simulator-Mode. Mit IP/Hostname deines K2 für Live-Modus.
      CFS_MOONRAKER_HOST: ${CFS_MOONRAKER_HOST:-}
      CFS_MOONRAKER_PORT: ${CFS_MOONRAKER_PORT:-80}
      CFS_DATABASE_URL: sqlite:////app/data/cfs.db
      CFS_CORS_ORIGINS: "*"
    volumes:
      - cfs-data:/app/data
    networks:
      - cfs
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: ${REGISTRY:-ghcr.io/marius}/cfs-filament-tracker-frontend:${TAG:-latest}
    container_name: cfs-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8088}:80"
    depends_on:
      - backend
    networks:
      - cfs
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Auto-update: checked die Registry alle 5 Minuten und updated Images automatisch.
  # Nur Container mit Label watchtower.enable=true werden berücksichtigt.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: cfs-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_POLL_INTERVAL: 300       # 5 min
      WATCHTOWER_CLEANUP: "true"          # alte Images löschen
      WATCHTOWER_LABEL_ENABLE: "true"     # nur Container mit Label updaten
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      TZ: ${TZ:-Europe/Zurich}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cfs

volumes:
  cfs-data:
    name: cfs-data

networks:
  cfs:
    name: cfs
