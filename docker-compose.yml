services:
  db:
    image: postgres:16-alpine
    container_name: cfsspoolsync-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cfsspoolsync}
      POSTGRES_USER: ${POSTGRES_USER:-cfs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cfs}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cfs} -d ${POSTGRES_DB:-cfsspoolsync}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cfsspoolsync-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: cfsspoolsync-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  db_data:
